services:
  api:
    build: .
    ports:
      - 8000:8000
    volumes:
      - ./:/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    env_file:
      - ./.env
    depends_on:
      - postgres
    restart: on-failure

  postgres:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=2006
      - POSTGRES_DB=fastapi
    volumes:
      - postgres-db:/var/lib/postgresql

volumes:
  postgres-db: